# Disabled during early scaffolding. Re-enable push/PR triggers when docs grow.
name: Docs

on:
  workflow_dispatch:
# push:
#   branches: [main]
# pull_request:
#   branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build documentation
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Install dependencies
        run: uv sync --extra docs

      - name: Build docs
        run: uv run mkdocs build --strict
