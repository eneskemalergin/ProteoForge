site_name: ProteoForge
site_description: Differential proteoform discovery for bottom-up proteomics
site_url: https://github.com/eneskemalergin/ProteoForge
repo_url: https://github.com/eneskemalergin/ProteoForge
repo_name: eneskemalergin/ProteoForge

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - search.suggest
    - content.code.copy

nav:
  - Home: index.md
  - Guides:
      - Configuration: config.md
      - Input and output: io.md
      - Prepare: prepare.md
      - Normalization: normalization.md
      - Discordance: discordance.md
      - Multiple-testing correction: correction.md
      - Clustering: clustering.md
      - PreparedDataset: prepared-dataset.md

markdown_extensions:
  - admonition
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.details
  - toc:
      permalink: true

docs_dir: docs
site_dir: site
strict: true
